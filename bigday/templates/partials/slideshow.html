{% load static %}

<div class="container">
    <div class="row">
        <div class="col-lg-12">
            <h2 class="section-heading text-center">More pictures from our engagment</h2>
            <hr class="primary">
            <div id="couplePicsCarousel" class="carousel slide" data-ride="carousel">
                <!-- Indicators (dots) -->
                <ol class="carousel-indicators">
                    <li data-target="#couplePicsCarousel" data-slide-to="0" class="active"></li>
                    <li data-target="#couplePicsCarousel" data-slide-to="1"></li>
                    <li data-target="#couplePicsCarousel" data-slide-to="2"></li>
                </ol>
                <div class="carousel-inner">
                    <div class="item active">
                        <img src="{% static 'bigday/lg_images/engagement-thumbsup.jpg' %}" style="max-height: 400px; margin-left: auto; margin-right: auto;">
                        <div class="carousel-caption">
                            <h3>Enjoying being engaged</h3>
                        </div>
                    </div>
                    <div class="item">
                        <img src="{% static 'bigday/lg_images/river-july4th.jpg' %}" style="max-height: 400px; margin-left: auto; margin-right: auto;">
                        <div class="carousel-caption">
                            <p>Celebrating the fourth of July the day before we got engaged</p>
                        </div>
                    </div>
                    <div class="item">
                        <img src="{% static 'bigday/lg_images/engagement-boat.jpg' %}" style="max-height: 400px; margin-left: auto; margin-right: auto;">
                        <div class="carousel-caption">
                            <p>Celebrating with the decorations that our friends surprised us with</p>
                        </div>
                    </div>
                </div>
                <a class="left carousel-control" data-target="#couplePicsCarousel" data-slide="prev">
                    <span class="glyphicon glyphicon-chevron-left"></span>
                </a>
                <a class="right carousel-control" data-target="#couplePicsCarousel" data-slide="next">
                    <span class="glyphicon glyphicon-chevron-right"></span>
                </a>
            </div>
        </div>
    </div>
</div>
